<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>PAEC</title>

<body>
  <h1>Holaaa</h1>
  <ul id="paec"></ul>

  <script>
   const url = 'https://siuu.onrender.com/paec';

// 2. We make the call
fetch(url)
  .then(response => {
    // Check if the connection was successful
    if (!response.ok) {
      throw new Error('Network response was not ok');
    }
    return response.json(); // Convert the data to JSON
  })
  .then(data => {
    // THIS IS WHAT YOUR TEACHER WANTS TO SEE IN THE CONSOLE
    console.log("Data successfully received:", data);

  })
  .catch(error => {
    console.error("There was an error fetching the data:", error);
  });
  </script>
</body>
