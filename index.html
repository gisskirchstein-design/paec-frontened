<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PAEC</title>
</head>
<body>
  <h1>Holaaa</h1>
  <div id="paec"></div>

  <script>
    const url = 'https://siuu.onrender.com/paec';

    fetch(url)
      .then(res => res.json())
      .then(data => {
        console.log("Datos:", data);

        const contenedor = document.getElementById('paec');

        if (data.length > 0) {
          // ⚠️ cambia "mensaje" si tu columna se llama diferente
          contenedor.textContent = data[0].mensaje;
        } else {
          contenedor.textContent = "No hay datos";
        }
      })
      .catch(err => {
        console.error(err);
      });
  </script>
</body>
</html>
