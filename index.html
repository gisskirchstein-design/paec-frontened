<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PAEC</title>
</head>
<body>
  <h1>Holaaa</h1>
  <ul id="lista"></ul>

  <script>
    fetch(' https://paec-backend.onrender.com/paec')
      .then(res => res.json())
      .then(data => {
        const lista = document.getElementById('lista');

        data.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item.paec;
          lista.appendChild(li);
        });
      })
      .catch(err => console.error(err));
  </script>
</body>
</html>
